name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "23 5 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.json
          results_format: json
          publish_results: false
