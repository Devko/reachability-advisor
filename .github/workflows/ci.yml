name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -e ".[dev]"
      - run: make compile
      - run: make lint
      - run: make type-check
      - run: make test
      - run: make coverage
      - run: make sample
      - run: make demo
      - run: make fixtures
      - run: make release-check
      - run: make package
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: reachability-advisor version
      - name: Upload generated outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reachability-outputs-py${{ matrix.python-version }}
          path: |
            outputs/**/*.json
            outputs/**/*.md
            outputs/**/*.sarif
            outputs/**/*.html
            outputs/**/*.txt
          if-no-files-found: ignore
      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reachability-dist-py${{ matrix.python-version }}
          path: dist/*
          if-no-files-found: ignore
