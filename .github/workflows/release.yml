name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -e ".[dev]"
      - run: make compile
      - run: make lint
      - run: make type-check
      - run: make test
      - run: make coverage
      - run: make sample
      - run: make demo
      - run: make fixtures
      - run: make release-check
      - run: make package
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            dist/SHA256SUMS
