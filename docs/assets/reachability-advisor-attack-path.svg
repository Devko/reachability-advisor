<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="430" viewBox="0 0 1180 430" role="img" aria-labelledby="title desc">
  <title id="title">Reachability Advisor attack path overview</title>
  <desc id="desc">A local-first prioritization flow from scanner inputs through deployment context to an attack path, affected asset, and evidence groups.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <style>
      .bg{fill:#f8fafc}
      .panel{fill:#fff;stroke:#dbe3ef;stroke-width:1.4;filter:url(#shadow)}
      .dark{fill:#102033}
      .edge{fill:none;stroke:#64748b;stroke-width:2.4;marker-end:url(#arrow)}
      .risk{fill:none;stroke:#db2777;stroke-width:2.2;stroke-dasharray:5 6;marker-end:url(#arrow)}
      .txt{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#162033}
      .muted{fill:#667085}
      .white{fill:#fff}
      .title{font-size:20px;font-weight:800}
      .label{font-size:15px;font-weight:800}
      .small{font-size:12px;font-weight:600}
      .chip{fill:#eef4ff;stroke:#d8e6ff}
      .urgent{fill:#fee2e2;stroke:#fecaca}
      .high{fill:#fff7ed;stroke:#fed7aa}
      .runtime{fill:#fff1f2;stroke:#fecdd3}
      .static{fill:#f5f3ff;stroke:#ddd6fe}
      .identity{fill:#ecfeff;stroke:#a5f3fc}
    </style>
  </defs>
  <rect class="bg" width="1180" height="430"/>
  <text class="txt title" x="42" y="46">Reachability Advisor</text>
  <text class="txt muted small" x="42" y="70">Correlate dependency, SAST, DAST, source, Terraform, Kubernetes, IAM, and network evidence into a graph-first priority decision.</text>

  <rect class="panel" x="42" y="108" width="170" height="190" rx="16"/>
  <text class="txt label" x="66" y="140">Inputs</text>
  <text class="txt muted small" x="66" y="168">SBOM + Grype/OSV</text>
  <text class="txt muted small" x="66" y="192">Semgrep / CodeQL</text>
  <text class="txt muted small" x="66" y="216">ZAP / Nuclei</text>
  <text class="txt muted small" x="66" y="240">Terraform plan</text>
  <text class="txt muted small" x="66" y="264">Kubernetes manifests</text>

  <rect class="dark" x="270" y="155" width="128" height="82" rx="18" filter="url(#shadow)"/>
  <text class="white label" x="306" y="190">Internet</text>
  <text class="white small" x="301" y="212">attacker entry</text>

  <rect class="panel" x="462" y="148" width="160" height="96" rx="18"/>
  <text class="txt label" x="496" y="184">Ingress</text>
  <text class="txt muted small" x="490" y="207">LB / API / Gateway</text>

  <rect class="panel" x="686" y="132" width="178" height="130" rx="18"/>
  <text class="txt label" x="724" y="166">Workload</text>
  <text class="txt muted small" x="718" y="190">artifact + service</text>
  <rect class="urgent" x="716" y="211" width="62" height="25" rx="12"/>
  <text class="txt small" x="730" y="228">urgent</text>
  <rect class="chip" x="786" y="211" width="50" height="25" rx="12"/>
  <text class="txt small" x="798" y="228">99.5</text>

  <rect class="panel runtime" x="946" y="92" width="178" height="70" rx="15"/>
  <text class="txt label" x="970" y="121">Runtime</text>
  <text class="txt muted small" x="970" y="143">DAST observed route</text>
  <rect class="panel static" x="946" y="182" width="178" height="70" rx="15"/>
  <text class="txt label" x="970" y="211">Static</text>
  <text class="txt muted small" x="970" y="233">SAST/source evidence</text>
  <rect class="panel identity" x="946" y="272" width="178" height="70" rx="15"/>
  <text class="txt label" x="970" y="301">Identity</text>
  <text class="txt muted small" x="970" y="323">IAM/data impact</text>

  <path class="edge" d="M212 203 C235 203, 242 196, 270 196"/>
  <path class="edge" d="M398 196 C428 196, 432 196, 462 196"/>
  <path class="edge" d="M622 196 C652 196, 656 197, 686 197"/>
  <path class="risk" d="M864 188 C904 188, 904 127, 946 127"/>
  <path class="risk" d="M864 198 C905 198, 904 217, 946 217"/>
  <path class="risk" d="M864 208 C904 208, 904 307, 946 307"/>

  <rect class="panel" x="268" y="318" width="598" height="64" rx="14"/>
  <text class="txt label" x="292" y="346">Output</text>
  <text class="txt muted small" x="292" y="367">Prioritized findings, evidence paths, SARIF, IDE diagnostics, Markdown, HTML attack-path report, coverage, readiness, and PR deltas.</text>
</svg>
