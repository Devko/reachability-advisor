name: Reachability Advisor
summary: Security prioritization with dependency, source, Terraform, network, IAM, SAST, and DAST context
description: Runs Reachability Advisor and emits findings, evidence graph, baseline, PR delta, SARIF, diagnostics, Markdown, HTML, annotations, mapping, source coverage, security evidence coverage, and deployment coverage.
inputs:
  sbom:
    description: One or more CycloneDX SBOM paths. Use newline-separated paths for multiple artifacts.
    required: true
  vuln-in:
    description: Newline-separated vulnerability intelligence paths, usually Grype JSON generated from the same SBOM set.
    required: true
  source-root:
    description: Newline-separated artifact=path source-root mappings. Required for code reachability.
    required: false
    default: ""
  artifact-alias:
    description: Newline-separated artifact=reference aliases for SBOMs without strong artifact metadata.
    required: false
    default: ""
  artifact-manifest:
    description: Newline-separated CI artifact identity manifests with built image digests, registry refs, Git SHA, SBOM paths, and renderer metadata.
    required: false
    default: ""
  require-artifact-provenance:
    description: Set to true to require artifact manifests with digest identity, SBOM path, Git SHA, and signature/attestation marker.
    required: false
    default: "false"
  context:
    description: Context JSON path for explicit overrides or enrichment.
    required: false
    default: ""
  terraform-plan:
    description: terraform show -json plan path. Required for full deployment scoring.
    required: false
    default: ""
  terraform-source:
    description: Terraform source directory or .tf file for conservative static HCL fallback when no plan is available.
    required: false
    default: ""
  kubernetes-manifest:
    description: Newline-separated rendered Kubernetes YAML/JSON manifest files or directories.
    required: false
    default: ""
  kubernetes-infer-lateral:
    description: Set to true to treat internal Kubernetes services as laterally reachable when a public entrypoint is present.
    required: false
    default: "false"
  reachability-rules:
    description: Custom reachability rules JSON path.
    required: false
    default: ""
  source-evidence-in:
    description: Newline-separated external source evidence files. Supports Reachability Advisor JSON, Semgrep JSON, SARIF, and govulncheck JSONL.
    required: false
    default: ""
  security-evidence-in:
    description: Newline-separated generic first-party SAST/DAST/CSPM finding files. Supports normalized JSON, Semgrep JSON, SARIF, ZAP JSON, Nuclei JSONL, and posture scanner JSON.
    required: false
    default: ""
  sast-in:
    description: Newline-separated SAST evidence files. Defaults imported records to scanner_type=sast.
    required: false
    default: ""
  dast-in:
    description: Newline-separated DAST evidence files. Defaults imported records to scanner_type=dast.
    required: false
    default: ""
  cspm-in:
    description: Newline-separated CSPM/posture evidence files. Defaults imported records to scanner_type=cspm.
    required: false
    default: ""
  analysis-profile:
    description: advisory or production. Production requires external source evidence and rendered deployment evidence.
    required: false
    default: "production"
  min-artifact-match-coverage:
    description: Optional 0..1 gate for SBOM artifact to deployment workload match coverage.
    required: false
    default: ""
  min-strong-artifact-identity-coverage:
    description: Optional 0..1 gate for strong image/digest artifact identity coverage.
    required: false
    default: ""
  fail-on-mapping-warnings:
    description: Set to true to fail when mapping warnings are present.
    required: false
    default: "false"
  min-source-rule-coverage:
    description: Optional 0..1 gate for source package-rule coverage.
    required: false
    default: ""
  require-external-source-evidence:
    description: Set to true to require imported Semgrep, CodeQL/SARIF, govulncheck, or native source evidence.
    required: false
    default: "false"
  require-strong-source-for-critical:
    description: Set to true to fail when critical findings only have dependency-level or weaker source evidence. Production profile enables this behavior.
    required: false
    default: "false"
  min-external-evidence-usable-ratio:
    description: Optional 0..1 gate for imported external source evidence selector usability.
    required: false
    default: ""
  min-critical-external-source-coverage:
    description: Optional 0..1 gate for critical findings covered by external source analyzer evidence. Production defaults to 1.0.
    required: false
    default: ""
  min-critical-query-family-coverage:
    description: Optional 0..1 gate for critical findings covered by relevant source query-family evidence. Production defaults to 1.0.
    required: false
    default: ""
  min-critical-proven-query-family-coverage:
    description: Optional 0..1 gate for critical findings covered by proven maintained query families. Production defaults to 1.0.
    required: false
    default: ""
  min-critical-security-profile-coverage:
    description: Optional 0..1 gate for imported high/critical SAST/DAST findings covered by maintained security profiles.
    required: false
    default: ""
  require-release-ready:
    description: Set to true to fail when the release evidence readiness report contains blockers.
    required: false
    default: "false"
  fail-on-readiness-warnings:
    description: Set to true to fail when the release evidence readiness report contains warnings.
    required: false
    default: "false"
  policy:
    description: Runtime policy JSON path.
    required: false
    default: ""
  output-dir:
    description: Directory for generated Reachability Advisor outputs.
    required: false
    default: outputs/reachability-advisor
  baseline:
    description: Default-branch Reachability Advisor baseline artifact. When set, the action writes a PR delta with only new or worsened findings.
    required: false
    default: ""
  fail-on-tier:
    description: Tier threshold: urgent, high, medium, low, informational.
    required: false
    default: ""
  fail-on-new-tier:
    description: PR delta threshold for new or worsened findings when baseline is set.
    required: false
    default: ""
outputs:
  findings:
    description: Findings JSON output path.
    value: ${{ steps.scan.outputs.findings }}
  sarif:
    description: SARIF output path.
    value: ${{ steps.scan.outputs.sarif }}
  diagnostics:
    description: IDE diagnostics JSON output path.
    value: ${{ steps.scan.outputs.diagnostics }}
  markdown:
    description: Markdown summary output path.
    value: ${{ steps.scan.outputs.markdown }}
  html:
    description: Interactive HTML graph report output path.
    value: ${{ steps.scan.outputs.html }}
  evidence_graph:
    description: Structured evidence graph JSON output path.
    value: ${{ steps.scan.outputs.evidence_graph }}
  annotations:
    description: GitHub Actions annotations text output path.
    value: ${{ steps.scan.outputs.annotations }}
  mapping:
    description: SBOM/source/Terraform mapping JSON output path.
    value: ${{ steps.scan.outputs.mapping }}
  terraform_coverage:
    description: Terraform coverage JSON output path.
    value: ${{ steps.scan.outputs.terraform_coverage }}
  kubernetes_coverage:
    description: Kubernetes manifest coverage JSON output path.
    value: ${{ steps.scan.outputs.kubernetes_coverage }}
  source_coverage:
    description: Source-analysis coverage JSON output path.
    value: ${{ steps.scan.outputs.source_coverage }}
  readiness:
    description: Release evidence readiness JSON output path.
    value: ${{ steps.scan.outputs.readiness }}
  baseline:
    description: Stable baseline artifact output path.
    value: ${{ steps.scan.outputs.baseline }}
  delta:
    description: PR delta JSON output path when a baseline is supplied.
    value: ${{ steps.scan.outputs.delta }}
  delta_markdown:
    description: PR delta Markdown output path when a baseline is supplied.
    value: ${{ steps.scan.outputs.delta_markdown }}
runs:
  using: composite
  steps:
    - name: Install Reachability Advisor
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install "$GITHUB_ACTION_PATH"

    - id: scan
      name: Run Reachability Advisor
      shell: bash
      env:
        RA_INPUT_SBOM: ${{ inputs.sbom }}
        RA_INPUT_VULN_IN: ${{ inputs.vuln-in }}
        RA_INPUT_SOURCE_ROOT: ${{ inputs.source-root }}
        RA_INPUT_ARTIFACT_ALIAS: ${{ inputs.artifact-alias }}
        RA_INPUT_ARTIFACT_MANIFEST: ${{ inputs.artifact-manifest }}
        RA_INPUT_REQUIRE_ARTIFACT_PROVENANCE: ${{ inputs.require-artifact-provenance }}
        RA_INPUT_CONTEXT: ${{ inputs.context }}
        RA_INPUT_TERRAFORM_PLAN: ${{ inputs.terraform-plan }}
        RA_INPUT_TERRAFORM_SOURCE: ${{ inputs.terraform-source }}
        RA_INPUT_KUBERNETES_MANIFEST: ${{ inputs.kubernetes-manifest }}
        RA_INPUT_KUBERNETES_INFER_LATERAL: ${{ inputs.kubernetes-infer-lateral }}
        RA_INPUT_REACHABILITY_RULES: ${{ inputs.reachability-rules }}
        RA_INPUT_SOURCE_EVIDENCE_IN: ${{ inputs.source-evidence-in }}
        RA_INPUT_SECURITY_EVIDENCE_IN: ${{ inputs.security-evidence-in }}
        RA_INPUT_SAST_IN: ${{ inputs.sast-in }}
        RA_INPUT_DAST_IN: ${{ inputs.dast-in }}
        RA_INPUT_CSPM_IN: ${{ inputs.cspm-in }}
        RA_INPUT_ANALYSIS_PROFILE: ${{ inputs.analysis-profile }}
        RA_INPUT_MIN_ARTIFACT_MATCH_COVERAGE: ${{ inputs.min-artifact-match-coverage }}
        RA_INPUT_MIN_STRONG_ARTIFACT_IDENTITY_COVERAGE: ${{ inputs.min-strong-artifact-identity-coverage }}
        RA_INPUT_FAIL_ON_MAPPING_WARNINGS: ${{ inputs.fail-on-mapping-warnings }}
        RA_INPUT_MIN_SOURCE_RULE_COVERAGE: ${{ inputs.min-source-rule-coverage }}
        RA_INPUT_REQUIRE_EXTERNAL_SOURCE_EVIDENCE: ${{ inputs.require-external-source-evidence }}
        RA_INPUT_REQUIRE_STRONG_SOURCE_FOR_CRITICAL: ${{ inputs.require-strong-source-for-critical }}
        RA_INPUT_MIN_EXTERNAL_EVIDENCE_USABLE_RATIO: ${{ inputs.min-external-evidence-usable-ratio }}
        RA_INPUT_MIN_CRITICAL_EXTERNAL_SOURCE_COVERAGE: ${{ inputs.min-critical-external-source-coverage }}
        RA_INPUT_MIN_CRITICAL_QUERY_FAMILY_COVERAGE: ${{ inputs.min-critical-query-family-coverage }}
        RA_INPUT_MIN_CRITICAL_PROVEN_QUERY_FAMILY_COVERAGE: ${{ inputs.min-critical-proven-query-family-coverage }}
        RA_INPUT_MIN_CRITICAL_SECURITY_PROFILE_COVERAGE: ${{ inputs.min-critical-security-profile-coverage }}
        RA_INPUT_REQUIRE_RELEASE_READY: ${{ inputs.require-release-ready }}
        RA_INPUT_FAIL_ON_READINESS_WARNINGS: ${{ inputs.fail-on-readiness-warnings }}
        RA_INPUT_POLICY: ${{ inputs.policy }}
        RA_INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        RA_INPUT_BASELINE: ${{ inputs.baseline }}
        RA_INPUT_FAIL_ON_TIER: ${{ inputs.fail-on-tier }}
        RA_INPUT_FAIL_ON_NEW_TIER: ${{ inputs.fail-on-new-tier }}
      run: |
        set -euo pipefail

        trim() {
          local value="$1"
          value="${value#"${value%%[![:space:]]*}"}"
          value="${value%"${value##*[![:space:]]}"}"
          printf '%s' "$value"
        }

        add_repeated_args() {
          local flag="$1"
          local raw="$2"
          local item
          while IFS= read -r item; do
            item="$(trim "$item")"
            if [[ -n "$item" ]]; then
              args+=("$flag" "$item")
            fi
          done <<< "$raw"
        }

        output_dir="$RA_INPUT_OUTPUT_DIR"
        if [[ "$output_dir" == *$'\n'* || "$output_dir" == *$'\r'* ]]; then
          echo "::error::output-dir must not contain newline characters"
          exit 2
        fi
        mkdir -p "$output_dir"

        findings="$output_dir/reachability-findings.json"
        sarif="$output_dir/reachability.sarif"
        diagnostics="$output_dir/reachability-diagnostics.json"
        markdown="$output_dir/reachability-summary.md"
        html="$output_dir/reachability-graph.html"
        evidence_graph="$output_dir/reachability-evidence-graph.json"
        annotations="$output_dir/reachability-annotations.txt"
        mapping="$output_dir/reachability-mapping.json"
        terraform_coverage="$output_dir/terraform-coverage.json"
        kubernetes_coverage="$output_dir/kubernetes-coverage.json"
        source_coverage="$output_dir/source-coverage.json"
        readiness="$output_dir/release-readiness.json"
        baseline_out="$output_dir/reachability-baseline.json"
        delta="$output_dir/reachability-delta.json"
        delta_markdown="$output_dir/reachability-delta.md"

        args=(scan --out "$findings" --baseline-out "$baseline_out" --sarif-out "$sarif" --diagnostics-out "$diagnostics" --markdown-out "$markdown" --html-out "$html" --evidence-graph-out "$evidence_graph" --annotations-out "$annotations" --mapping-out "$mapping" --source-coverage-out "$source_coverage" --readiness-out "$readiness" --no-table)

        add_repeated_args "--sbom" "$RA_INPUT_SBOM"
        add_repeated_args "--vuln-in" "$RA_INPUT_VULN_IN"
        add_repeated_args "--source-root" "$RA_INPUT_SOURCE_ROOT"
        add_repeated_args "--artifact-alias" "$RA_INPUT_ARTIFACT_ALIAS"
        add_repeated_args "--artifact-manifest" "$RA_INPUT_ARTIFACT_MANIFEST"
        add_repeated_args "--source-evidence-in" "$RA_INPUT_SOURCE_EVIDENCE_IN"
        add_repeated_args "--security-evidence-in" "$RA_INPUT_SECURITY_EVIDENCE_IN"
        add_repeated_args "--sast-in" "$RA_INPUT_SAST_IN"
        add_repeated_args "--dast-in" "$RA_INPUT_DAST_IN"
        add_repeated_args "--cspm-in" "$RA_INPUT_CSPM_IN"
        add_repeated_args "--kubernetes-manifest" "$RA_INPUT_KUBERNETES_MANIFEST"

        args+=(--analysis-profile "$RA_INPUT_ANALYSIS_PROFILE")
        if [[ -n "$RA_INPUT_CONTEXT" ]]; then args+=(--context "$RA_INPUT_CONTEXT"); fi
        if [[ -n "$RA_INPUT_REACHABILITY_RULES" ]]; then args+=(--reachability-rules "$RA_INPUT_REACHABILITY_RULES"); fi
        if [[ -n "$RA_INPUT_POLICY" ]]; then args+=(--policy "$RA_INPUT_POLICY"); fi
        if [[ -n "$RA_INPUT_TERRAFORM_PLAN" ]]; then args+=(--terraform-plan "$RA_INPUT_TERRAFORM_PLAN" --terraform-coverage-out "$terraform_coverage"); fi
        if [[ -n "$RA_INPUT_TERRAFORM_SOURCE" ]]; then args+=(--terraform-source "$RA_INPUT_TERRAFORM_SOURCE" --terraform-coverage-out "$terraform_coverage"); fi
        if [[ -n "$RA_INPUT_KUBERNETES_MANIFEST" ]]; then args+=(--kubernetes-coverage-out "$kubernetes_coverage"); fi
        if [[ "$RA_INPUT_KUBERNETES_INFER_LATERAL" == "true" ]]; then args+=(--kubernetes-infer-lateral); fi
        if [[ "$RA_INPUT_REQUIRE_ARTIFACT_PROVENANCE" == "true" ]]; then args+=(--require-artifact-provenance); fi
        if [[ -n "$RA_INPUT_MIN_ARTIFACT_MATCH_COVERAGE" ]]; then args+=(--min-artifact-match-coverage "$RA_INPUT_MIN_ARTIFACT_MATCH_COVERAGE"); fi
        if [[ -n "$RA_INPUT_MIN_STRONG_ARTIFACT_IDENTITY_COVERAGE" ]]; then args+=(--min-strong-artifact-identity-coverage "$RA_INPUT_MIN_STRONG_ARTIFACT_IDENTITY_COVERAGE"); fi
        if [[ "$RA_INPUT_FAIL_ON_MAPPING_WARNINGS" == "true" ]]; then args+=(--fail-on-mapping-warnings); fi
        if [[ -n "$RA_INPUT_MIN_SOURCE_RULE_COVERAGE" ]]; then args+=(--min-source-rule-coverage "$RA_INPUT_MIN_SOURCE_RULE_COVERAGE"); fi
        if [[ "$RA_INPUT_REQUIRE_EXTERNAL_SOURCE_EVIDENCE" == "true" ]]; then args+=(--require-external-source-evidence); fi
        if [[ "$RA_INPUT_REQUIRE_STRONG_SOURCE_FOR_CRITICAL" == "true" ]]; then args+=(--require-strong-source-for-critical); fi
        if [[ -n "$RA_INPUT_MIN_EXTERNAL_EVIDENCE_USABLE_RATIO" ]]; then args+=(--min-external-evidence-usable-ratio "$RA_INPUT_MIN_EXTERNAL_EVIDENCE_USABLE_RATIO"); fi
        if [[ -n "$RA_INPUT_MIN_CRITICAL_EXTERNAL_SOURCE_COVERAGE" ]]; then args+=(--min-critical-external-source-coverage "$RA_INPUT_MIN_CRITICAL_EXTERNAL_SOURCE_COVERAGE"); fi
        if [[ -n "$RA_INPUT_MIN_CRITICAL_QUERY_FAMILY_COVERAGE" ]]; then args+=(--min-critical-query-family-coverage "$RA_INPUT_MIN_CRITICAL_QUERY_FAMILY_COVERAGE"); fi
        if [[ -n "$RA_INPUT_MIN_CRITICAL_PROVEN_QUERY_FAMILY_COVERAGE" ]]; then args+=(--min-critical-proven-query-family-coverage "$RA_INPUT_MIN_CRITICAL_PROVEN_QUERY_FAMILY_COVERAGE"); fi
        if [[ -n "$RA_INPUT_MIN_CRITICAL_SECURITY_PROFILE_COVERAGE" ]]; then args+=(--min-critical-security-profile-coverage "$RA_INPUT_MIN_CRITICAL_SECURITY_PROFILE_COVERAGE"); fi
        if [[ "$RA_INPUT_REQUIRE_RELEASE_READY" == "true" ]]; then args+=(--require-release-ready); fi
        if [[ "$RA_INPUT_FAIL_ON_READINESS_WARNINGS" == "true" ]]; then args+=(--fail-on-readiness-warnings); fi
        if [[ -n "$RA_INPUT_FAIL_ON_TIER" ]]; then args+=(--fail-on-tier "$RA_INPUT_FAIL_ON_TIER"); fi

        set +e
        reachability-advisor "${args[@]}"
        scan_code=$?
        set -e

        delta_code=0
        if [[ -n "$RA_INPUT_BASELINE" ]]; then
          delta_args=(compare --baseline "$RA_INPUT_BASELINE" --head-findings "$findings" --out "$delta" --markdown-out "$delta_markdown")
          if [[ -n "$RA_INPUT_FAIL_ON_NEW_TIER" ]]; then delta_args+=(--fail-on-new-tier "$RA_INPUT_FAIL_ON_NEW_TIER"); fi
          set +e
          reachability-advisor "${delta_args[@]}"
          delta_code=$?
          set -e
        fi

        test ! -f "$annotations" || cat "$annotations"
        if [[ -n "${GITHUB_STEP_SUMMARY:-}" && -f "$markdown" ]]; then
          cat "$markdown" >> "$GITHUB_STEP_SUMMARY"
        fi
        if [[ -n "${GITHUB_STEP_SUMMARY:-}" && -f "$delta_markdown" ]]; then
          {
            echo ""
            cat "$delta_markdown"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        if [[ -n "${GITHUB_OUTPUT:-}" ]]; then
          {
            printf 'findings=%s\n' "$findings"
            printf 'sarif=%s\n' "$sarif"
            printf 'diagnostics=%s\n' "$diagnostics"
            printf 'markdown=%s\n' "$markdown"
            printf 'html=%s\n' "$html"
            printf 'evidence_graph=%s\n' "$evidence_graph"
            printf 'annotations=%s\n' "$annotations"
            printf 'mapping=%s\n' "$mapping"
            printf 'terraform_coverage=%s\n' "$terraform_coverage"
            printf 'kubernetes_coverage=%s\n' "$kubernetes_coverage"
            printf 'source_coverage=%s\n' "$source_coverage"
            printf 'readiness=%s\n' "$readiness"
            printf 'baseline=%s\n' "$baseline_out"
            printf 'delta=%s\n' "$delta"
            printf 'delta_markdown=%s\n' "$delta_markdown"
          } >> "$GITHUB_OUTPUT"
        fi

        if [[ "$scan_code" -eq 0 && "$delta_code" -ne 0 ]]; then
          exit "$delta_code"
        fi
        exit "$scan_code"
